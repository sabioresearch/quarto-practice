project:
  type: website

website:
  title: "Quarto Pratica"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - about.qmd

format:
  html:
    theme:
      light: [flatly, styles-light.scss, custom.scss]
      dark: [darkly, styles-dark.scss, custom.scss]
    highlight-style:
      light: github
      dark: github-dark
    css: styles.css
    toc: true
    code-fold: true          # collapsible code blocks
    code-tools: false         # copy button + show/hide all
    code-line-numbers: true  # line numbers
    code-overflow: scroll    # horizontal scroll instead of wrap



